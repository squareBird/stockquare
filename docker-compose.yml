# Stockquare — Phase 1 local development stack
#
# Usage:
#   1. Create `.env` at project root. Minimum variables (KIS keys optional in dev):
#        POSTGRES_USER=stockquare
#        POSTGRES_PASSWORD=stockquare
#        POSTGRES_DB=stockquare
#        KIS_APP_KEY=...
#        KIS_APP_SECRET=...
#        KIS_ACCOUNT_NO=...
#   2. `docker compose up --build -d`
#   3. Backend: http://localhost:8000   Frontend: http://localhost:3000/dashboard
#
# AI assistant note (see .aicontext/guides/DEPLOYMENT.md):
#   The assistant runs the user's LOCAL Claude Code via the Claude Agent SDK,
#   so the backend must run on the host (not in a container) when the assistant
#   is enabled. The `backend` service below is gated behind the `containerized`
#   compose profile; it is NOT started by a bare `docker compose up`.
#
#   - AI-enabled (default): run DB (+ optional frontend) in Docker, backend local
#       docker compose up -d postgres
#       cd backend && uvicorn app.main:app --reload --port 8000
#   - No-AI / fully containerized:
#       docker compose --profile containerized up --build -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockquare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockquare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockquare}
      POSTGRES_DB: ${POSTGRES_DB:-stockquare}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockquare} -d ${POSTGRES_DB:-stockquare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - stockquare-net

  backend:
    # Gated behind the `containerized` profile: the AI assistant needs the
    # backend on the host to reach the local Claude Code, so a bare
    # `docker compose up` intentionally does NOT start this service.
    profiles: ["containerized"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockquare-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # Override sqlite default from app/config.py with the in-network postgres.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockquare}:${POSTGRES_PASSWORD:-stockquare}@postgres:5432/${POSTGRES_DB:-stockquare}
      APP_ENV: development
      LOG_LEVEL: INFO
      # Phase 2 trading safety gates — explicit so .env can't silently
      # downgrade them. Captain confirmed REAL-mode deploy with the
      # 50,000 KRW per-order notional cap still enforced.
      TRADING_REAL_MODE_ENABLED: "true"
      TRADING_MAX_ORDER_AMOUNT: "50000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockquare-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Client-side fetches run in the browser, so this must be reachable
        # from the host, not the docker network hostname.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: stockquare-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    # No depends_on backend: the browser fetches the backend over the host
    # (NEXT_PUBLIC_API_BASE_URL), and in the AI-enabled topology the backend
    # runs on the host (not as a container), so a hard dependency would break
    # `docker compose up frontend`.
    networks:
      - stockquare-net

networks:
  stockquare-net:

volumes:
  postgres_data:
